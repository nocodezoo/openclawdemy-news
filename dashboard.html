<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw News | Trending</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #0a0a0b; color: white; }
        .score-badge { padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 12px; }
        .score-green { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .score-yellow { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
        .score-orange { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
        .score-red { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .valid-link { color: #60a5fa; text-decoration: underline; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="py-6 px-4 border-b border-zinc-800">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-bold">🦞 OpenClaw <span class="text-orange-500">News</span></h1>
            <p class="text-zinc-500 text-sm">Reality vs Fiction • Only OpenClaw</p>
        </div>
    </header>

    <!-- Sources Bar -->
    <section class="py-4 px-4 border-b border-zinc-800">
        <div class="max-w-4xl mx-auto">
            <p class="text-xs text-zinc-500 mb-2">Sources: <span id="sources-count">--</span></p>
        </div>
    </section>

    <!-- Stats Bar -->
    <section class="py-6 px-4">
        <div class="max-w-4xl mx-auto grid grid-cols-4 gap-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-center">
                <p id="total-items" class="text-2xl font-bold text-white">--</p>
                <p class="text-xs text-zinc-500">Total Items</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-center">
                <p id="high-trust" class="text-2xl font-bold text-green-400">--</p>
                <p class="text-xs text-zinc-500">High Trust</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-center">
                <p id="mixed" class="text-2xl font-bold text-yellow-400">--</p>
                <p class="text-xs text-zinc-500">Mixed</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-center">
                <p id="low-trust" class="text-2xl font-bold text-red-400">--</p>
                <p class="text-xs text-zinc-500">Low Trust</p>
            </div>
        </div>
    </section>

    <!-- Recommended Section -->
    <section class="py-6 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="bg-green-900/20 border border-green-500/30 rounded-xl p-4 mb-4">
                <h2 class="text-lg font-bold text-green-400 mb-1">✅ Recommended for You</h2>
                <p class="text-sm text-zinc-400">Clicking these is what we recommend — high quality, verified content</p>
            </div>
            <div id="recommended-list" class="space-y-3"></div>
        </div>
    </section>

    <!-- Trending Now -->
    <section class="py-6 px-4">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                Trending Now (Most Engagement)
            </h2>
            <div id="trending-list" class="space-y-3"></div>
        </div>
    </section>

    <!-- All Items -->
    <section class="py-6 px-4 pb-20">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-lg font-bold mb-4">All Items (Sorted by Trust Score)</h2>
            <div id="all-items" class="space-y-3"></div>
        </div>
    </section>

    <script>
        async function loadData() {
            try {
                const response = await fetch('news_data.json?_=' + Date.now());
                const data = await response.json();
                updateDisplay(data);
            } catch (e) {
                console.log('Error:', e);
            }
        }

        function getScoreClass(score) {
            if (score >= 75) return 'score-green';
            if (score >= 50) return 'score-yellow';
            if (score >= 25) return 'score-orange';
            return 'score-red';
        }

        function formatEngagement(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        function renderItem(item, showGuidance = false) {
            const hasValidLink = item.url && item.truth_score > 0;
            const titleHtml = hasValidLink 
                ? `<a href="${item.url}" target="_blank" class="valid-link hover:text-blue-400">${item.title}</a>`
                : item.title;
            
            const guidance = showGuidance && item.truth_score >= 50 
                ? `<p class="text-xs text-green-400 mt-2">✓ Clicking this is what we recommend</p>` 
                : '';
            
            const warning = item.truth_score < 25 
                ? `<p class="text-xs text-red-400 mt-2">⚠️ This content appears fake or unverified</p>` 
                : '';
            
            return `
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1 flex-wrap">
                                <span class="text-xs bg-zinc-800 px-2 py-0.5 rounded">${item.source}</span>
                                <span class="text-xs text-zinc-500">${formatEngagement(item.engagement)} views</span>
                                <span class="text-xs text-orange-400">${item.time_ago || 'Recently'}</span>
                            </div>
                            <h3 class="font-medium">${titleHtml}</h3>
                            ${guidance}
                            ${warning}
                        </div>
                        <div class="score-badge ${getScoreClass(item.truth_score)}">
                            ${item.truth_score}
                        </div>
                    </div>
                </div>
            `;
        }

        function updateDisplay(data) {
            const stats = data.stats;
            
            document.getElementById('sources-count').textContent = data.sources_found.join(', ');
            document.getElementById('total-items').textContent = stats.total_items;
            document.getElementById('high-trust').textContent = stats.high_trust;
            document.getElementById('mixed').textContent = stats.mixed;
            document.getElementById('low-trust').textContent = stats.low_trust;
            
            // Recommended
            const recommended = data.all_items.filter(i => i.truth_score >= 50 && i.url);
            const recHtml = recommended.length > 0 
                ? recommended.slice(0, 5).map(item => renderItem(item, true)).join('')
                : '<p class="text-zinc-500">No recommended items found</p>';
            document.getElementById('recommended-list').innerHTML = recHtml;
            
            // Trending
            const trendingHtml = data.trending.map(item => renderItem(item, false)).join('');
            document.getElementById('trending-list').innerHTML = trendingHtml;
            
            // All items
            const allItemsHtml = data.all_items
                .sort((a, b) => b.truth_score - a.truth_score)
                .map(item => renderItem(item, false)).join('');
            document.getElementByEach('all-items').innerHTML = allItemsHtml;
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
